<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Matcher - Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p.subtitle { color: #94A3B8; margin-bottom: 32px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 16px; margin-bottom: 12px; color: #6366F1; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: #94A3B8; margin-bottom: 4px; }
    .field input[type="text"], .field input[type="email"], .field input[type="number"] {
      width: 100%; padding: 8px 12px; background: #1E293B; border: 1px solid #334155;
      border-radius: 6px; color: #F8FAFC; font-size: 13px;
    }
    .field input:focus { outline: none; border-color: #6366F1; }
    .btn {
      padding: 10px 20px; background: #6366F1; color: white; border: none;
      border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 16px;
    }
    .btn:hover { background: #818CF8; }
    .saved { color: #10B981; font-size: 13px; margin-left: 12px; display: none; }
  </style>
</head>
<body>
  <h1>Job Matcher Options</h1>
  <p class="subtitle">Configure your job matching preferences. These settings sync with the extension popup.</p>

  <div class="section">
    <h2>Backend Server</h2>
    <div class="field">
      <label>Server URL (for email notifications and match history)</label>
      <input type="text" id="serverUrl" value="http://localhost:3456">
    </div>
  </div>

  <div class="section">
    <h2>Email Notifications</h2>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="emailAddress" placeholder="your@email.com">
    </div>
  </div>

  <div class="section">
    <h2>Scoring</h2>
    <div class="field">
      <label>Default Threshold (0-100)</label>
      <input type="number" id="threshold" min="0" max="100" value="70">
    </div>
  </div>

  <button class="btn" id="save">Save Options</button>
  <span class="saved" id="savedMsg">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
